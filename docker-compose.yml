services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    mem_limit: 6g
    memswap_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ollama-proxy:
    build: ./services/ollama-proxy
    ports:
      - "8080:8080"
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      - OLLAMA_URL=http://ollama:11434
      - REQUEST_TIMEOUT=300
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  topic-scout:
    build:
      context: ./services
      dockerfile: topic-scout/Dockerfile
    ports:
      - "8001:8000"
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      - OLLAMA_PROXY_URL=http://ollama-proxy:8080
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama-proxy:
        condition: service_healthy

  summarizer:
    build:
      context: ./services
      dockerfile: summarizer/Dockerfile
    ports:
      - "8002:8000"
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      - OLLAMA_PROXY_URL=http://ollama-proxy:8080
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama-proxy:
        condition: service_healthy

  sentiment-analyzer:
    build:
      context: ./services
      dockerfile: sentiment-analyzer/Dockerfile
    ports:
      - "8003:8000"
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      - OLLAMA_PROXY_URL=http://ollama-proxy:8080
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama-proxy:
        condition: service_healthy

  editor:
    build:
      context: ./services
      dockerfile: editor/Dockerfile
    ports:
      - "8004:8000"
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      - OLLAMA_PROXY_URL=http://ollama-proxy:8080
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama-proxy:
        condition: service_healthy

volumes:
  ollama-data:
